query:
  fiscal_years: [2024, 2025]
  broad_keywords:
    - health disparities
    - telemedicine
    - artificial intelligence
  text_search_field: all
  text_search_operator: or

  # Optional: MeSH concept expansion reduces dependence on exact search terms.
  # It uses National Library of Medicine MeSH terminology before the NIH search.
  # If disabled or unavailable, the pipeline falls back to the original keywords.
  mesh_expansion:
    enabled: true
    max_terms_per_keyword: 15
    include_entry_terms: true
    include_tree_children: true
    max_tree_depth: 1
    fallback_to_original: true
    cache_enabled: true

  # Optional: semantic MeSH expansion uses vector search over local MeSH descriptor metadata.
  # Requires embedding artifacts created by:
  # python scripts/build_mesh_embeddings.py --limit 1000
  # If disabled, no semantic retrieval is used.
  # For production, build the full index on a larger machine.
  semantic_expansion:
    enabled: false
    top_k: 10
    max_terms: 30
    min_score: null
    include_synonyms: true
    require_existing_index: false
  
  # AI-powered keyword expansion (optional)
  ai_expansion:
    enabled: false  # Set to true to enable AI expansion after MeSH expansion
    openai_api_key: null  # Set via OPENAI_API_KEY env var, or paste your key here
    model: gpt-4o-mini  # Options: gpt-4o-mini, gpt-4o, gpt-3.5-turbo
    max_expansions_per_keyword: 5  # Max synonyms/variations per keyword
    context: "biomedical research and health disparities"  # Domain context for expansion

  # Optional: generate several focused NIH queries and merge the results.
  multi_query_retrieval:
    enabled: false
    max_queries: 8
    pages_per_query: 1
    require_dimension_overlap: true
    include_original_query: true

  # Optional: public email enrichment after ranking.
  # This never changes NIH retrieval and does not overwrite existing PI emails.
  email_enrichment:
    enabled: false
    max_researchers: 25
    sources:
      - institution_web
      - pubmed
      - orcid
    timeout_seconds: 10
    max_pages_per_researcher: 3
    require_high_confidence: false

  # Optional: public researcher profile builder after ranking.
  # Adds profile/search URLs and outreach recommendations even when direct email is unavailable.
  profile_enrichment:
    enabled: false
    max_researchers: 25
    sources:
      - nih_reporter
      - pubmed
      - orcid
      - institution_web
    timeout_seconds: 10

topics:
  - name: AI + Health Disparities
    include_any:
      - ai
      - artificial intelligence
      - machine learning
    include_all: []
    exclude_any:
      - mouse
      - mice
      - rat
    co_require_groups:
      - [health disparities, equity, inequity]
      - [clinical, community, public health]

  - name: Telehealth Equity
    include_any:
      - telehealth
      - telemedicine
    include_all: []
    exclude_any: []
    co_require_groups:
      - [disparities, equity, access]
